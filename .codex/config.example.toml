# Example project-scoped Codex config.
# Copy to .codex/config.toml only after the project is trusted and the team agrees.
# Keep machine-local provider/auth/telemetry settings in ~/.codex/config.toml.

approval_policy = "on-request"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = false
exclude_slash_tmp = true
exclude_tmpdir_env_var = true

# Optional: use the built-in /review behavior with a dedicated review model if your team has standardized one.
# review_model = "<model-name>"
