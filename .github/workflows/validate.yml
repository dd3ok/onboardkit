name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Validate skill contract
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          def parse_repo_skill(path):
              text = path.read_text(encoding="utf-8")
              parts = text.split("---", 2)
              assert len(parts) == 3 and not parts[0].strip(), f"invalid frontmatter delimiters: {path}"
              metadata = {}
              for line in parts[1].splitlines():
                  if line.strip():
                      key, raw = line.split(":", 1)
                      key, raw = key.strip(), raw.strip()
                      assert key not in metadata, f"duplicate frontmatter key: {path}"
                      if key == "description":
                          assert raw.startswith('"') and raw.endswith('"'), f"description must be a quoted YAML string: {path}"
                          value = json.loads(raw)
                      else:
                          assert '"' not in raw and "'" not in raw, f"unexpected quoted frontmatter value: {path}"
                          value = raw
                      metadata[key] = value
              return text, metadata, parts[2].strip()

          def parse_repo_openai_yaml(path):
              text = path.read_text(encoding="utf-8")
              assert "\t" not in text, f"tabs are not allowed in {path}"
              data = {}
              section = None
              for line in text.splitlines():
                  if not line.strip():
                      continue
                  if not line.startswith(" "):
                      assert re.fullmatch(r"[a-z_]+:", line), f"invalid top-level YAML line: {line}"
                      section = line[:-1]
                      assert section not in data, f"duplicate YAML section: {section}"
                      data[section] = {}
                      continue
                  assert section is not None, f"YAML value without section: {line}"
                  match = re.fullmatch(r"  ([a-z_]+): (.+)", line)
                  assert match, f"invalid YAML field: {line}"
                  key, raw = match.groups()
                  assert key not in data[section], f"duplicate YAML key: {section}.{key}"
                  if raw in {"true", "false"}:
                      value = raw == "true"
                  else:
                      assert raw.startswith('"') and raw.endswith('"'), f"YAML strings must be quoted: {section}.{key}"
                      value = json.loads(raw)
                  data[section][key] = value
              return text, data

          runtime = Path("skills/onboardkit")
          skill_text, metadata, _ = parse_repo_skill(runtime / "SKILL.md")
          legacy_text, legacy_metadata, legacy_body = parse_repo_skill(Path("SKILL.md"))

          assert set(metadata) == {"name", "description"}, "unexpected frontmatter fields"
          assert re.fullmatch(r"[a-z0-9]+(?:-[a-z0-9]+)*", metadata["name"]), "invalid skill name"
          assert metadata["name"] == "onboardkit", "skill name mismatch"
          assert runtime.name == metadata["name"], "skill directory/name mismatch"
          assert 1 <= len(metadata["description"]) <= 1024, "invalid description"
          description_lead = metadata["description"][:120].lower()
          assert any(term in description_lead for term in ("initializ", "refresh", "audit", "clean", "rout")), "description must front-load its use cases"
          description_lower = metadata["description"].lower()
          assert any(scope in description_lower for scope in ("agents.md", "agent instruction", "coding agent")), "description scope missing"
          assert any(boundary in description_lower for boundary in ("not for ", "do not use for ", "do not use to ", "do not trigger for ", "use only when ", "use only for ", "use only to ", "use when the user explicitly ")), "description boundary missing"
          assert len(skill_text.splitlines()) < 500, "SKILL.md must stay under the Agent Skills 500-line recommendation"
          assert len(skill_text) < 20000, "SKILL.md exceeds the repository's 20,000-character token-budget backstop"
          assert legacy_metadata == metadata, "legacy and canonical frontmatter differ"
          assert len(re.findall(r"\S+", legacy_text)) <= 100, "legacy entrypoint is not minimal"

          expected_legacy_body = (
              "# onboardkit compatibility entrypoint\n\n"
              "Read and follow [the canonical onboardkit skill](skills/onboardkit/SKILL.md).\n\n"
              "This file only preserves existing full-repository installations. "
              "New installations must install `skills/onboardkit/` directly."
          )
          assert legacy_body == expected_legacy_body, "legacy entrypoint drifted"

          required_runtime_files = {"SKILL.md", "LICENSE", "agents/openai.yaml"}
          runtime_files = {
              path.relative_to(runtime).as_posix()
              for path in runtime.rglob("*")
              if path.is_file()
          }
          assert required_runtime_files <= runtime_files, "missing canonical runtime file"
          for filename in runtime_files:
              parts = Path(filename).parts
              allowed_reference = len(parts) == 2 and parts[0] == "references" and Path(filename).suffix == ".md"
              assert filename in required_runtime_files or allowed_reference, f"unexpected runtime file: {filename}"

          openai_text, openai_metadata = parse_repo_openai_yaml(runtime / "agents/openai.yaml")
          assert set(openai_metadata) == {"interface", "policy"}, "unexpected repository openai.yaml section"
          assert set(openai_metadata["interface"]) == {"display_name", "short_description", "default_prompt"}, "unexpected repository openai.yaml interface field"
          assert set(openai_metadata["policy"]) == {"allow_implicit_invocation"}, "unexpected repository openai.yaml policy field"
          interface = openai_metadata["interface"]
          display_name = interface["display_name"]
          short_description = interface["short_description"]
          default_prompt = interface["default_prompt"]
          assert display_name == display_name.strip() and 1 <= len(display_name) <= 64, "display_name must be a non-blank 1-64 character string"
          assert short_description == short_description.strip() and 25 <= len(short_description) <= 64, "short_description must be a non-blank 25-64 character string"
          assert default_prompt == default_prompt.strip() and f"${metadata['name']}" in default_prompt, "default_prompt must be non-blank and mention the skill"
          assert len(default_prompt) <= 200 and default_prompt.endswith((".", "!", "?")), "default_prompt must be a short sentence"
          assert openai_metadata["policy"]["allow_implicit_invocation"] is True, "this repository requires explicit implicit-invocation opt-in"
          assert Path("agents/openai.yaml").read_bytes() == (runtime / "agents/openai.yaml").read_bytes(), "legacy UI metadata drifted"
          assert Path("LICENSE").read_bytes() == (runtime / "LICENSE").read_bytes(), "runtime license drifted"

          readme = Path("README.md").read_text(encoding="utf-8")
          maintainer_contract = Path("AGENTS.md").read_text(encoding="utf-8")
          assert "$skill-installer" in readme and "tree/main/skills/onboardkit" in readme, "canonical installer path missing"
          assert "--no-cone" not in readme, "deprecated non-cone install guidance returned"
          assert not re.search(r"git(?:\s+-C\s+\S+)?\s+sparse-checkout", readme), "direct git sparse-checkout guidance returned"
          assert not re.search(r"git clone[^\n]*(?:\.agents|\.codex)/skills", readme), "full repository skill install returned"
          assert "Compared with Codex `/init`" in readme, "Codex init comparison missing"
          assert "or no file" in readme, "actionable no-op behavior missing from README"
          assert "it does not execute a model" in readme, "declarative-CI boundary missing from README"

          required_sections = [
              "## Decision Model",
              "## Workflow",
              "## Verification",
              "## Report",
              "## Maintenance",
          ]
          positions = [skill_text.find(section) for section in required_sections]
          assert all(position >= 0 for position in positions), "required skill section missing"
          assert positions == sorted(positions), "skill sections are out of order"

          decision_model = skill_text[positions[0]:positions[1]]
          workflow = skill_text[positions[1]:positions[2]]
          report_contract = skill_text[positions[3]:positions[4]]
          mode_line = next(line for line in decision_model.splitlines() if "**Mode:**" in line)
          authority_line = next(line for line in decision_model.splitlines() if "**Authority:**" in line)
          value_line = next(line for line in decision_model.splitlines() if "**Value:**" in line)
          blocking_line = next(line for line in decision_model.splitlines() if "**Blocking:**" in line)
          replacement_line = next(line for line in decision_model.splitlines() if "**Replacement:**" in line)
          assert all(term in mode_line.lower() for term in ("explicitly asks to change", "not required keywords", "trim", "reconcile")), "semantic edit-intent gate drifted"
          assert all(term in authority_line.lower() for term in ("provenance", "passage", "generated")), "generated-source authority must cover provenance and passage labels"
          assert all(term in value_line.lower() for term in ("completed task plans", "not permanent routing destinations", "supported alternative", "nonblocking safety gap", "never invent")), "value and safety-alternative contract drifted"
          assert all(term in blocking_line for term in ("Needs Input only", "Evidence-gated no-ops", "never solicit information", "emit Needs Input")), "blocking classification drifted"
          assert all(term in replacement_line for term in ("exclude the target sentence", "never creates a conflict", "every other applicable current source agrees", "those sources disagree")), "replacement consensus contract drifted"
          assert all(term in workflow for term in ("After editing an instruction source", "discovered nested instruction boundary", "do not walk unrelated directories", "For Codex", "another runtime", "old source -> new source", "current session does not reload", "next run or session", "emptied scaffold")), "bounded post-edit discovery contract drifted"
          assert all(term in report_contract for term in ("Blocking rule", "Needs Input")), "missing-information reporting contract drifted"

          forbidden_runtime_patterns = {
              "fixed AGENTS size": r"200-400",
              "ambiguous deletion preservation": r"Preserve deletions",
              "broad skill exclusion": r"ignored/external skill copies",
              "descriptive-doc authority shortcut": r"descriptive docs are candidates",
          }
          checked_text = skill_text + legacy_text + readme + openai_text
          maintained_text = checked_text + maintainer_contract
          for label, pattern in forbidden_runtime_patterns.items():
              assert not re.search(pattern, maintained_text, re.IGNORECASE), f"stale maintained pattern returned: {label}"

          assert "\ufffd" not in checked_text, "replacement character found in maintained text"

          eval_doc = json.loads(Path("evals/evals.json").read_text(encoding="utf-8"))
          cases = eval_doc["evals"]
          case_ids = [case["id"] for case in cases]
          allowed_eval_fields = {"id", "covers", "prompt", "expected_output", "assertions", "files"}
          required_eval_fields = {"id", "covers", "prompt", "expected_output", "assertions"}
          assert all(required_eval_fields <= set(case) <= allowed_eval_fields for case in cases), "unexpected eval fields"
          assert eval_doc["skill_name"] == metadata["name"], "eval skill name mismatch"
          assert all(type(case_id) is int and case_id > 0 for case_id in case_ids), "invalid eval ID"
          assert len(case_ids) == len(set(case_ids)), "eval IDs must be unique"
          assert len({case["prompt"] for case in cases}) == len(cases), "eval prompts must be unique"
          assert all(
              isinstance(case["prompt"], str)
              and case["prompt"]
              and isinstance(case["expected_output"], str)
              and case["expected_output"]
              and isinstance(case["assertions"], list)
              and case["assertions"]
              and all(isinstance(assertion, str) and assertion for assertion in case["assertions"])
              for case in cases
          ), "incomplete eval case"
          assert all(len(case["assertions"]) == len(set(case["assertions"])) for case in cases), "duplicate assertion within eval"
          known_vague_assertion = re.compile(r"\b(?:good|appropriate|proper|reasonable|well below|broadly applicable|durable narrow)\b|\bonly (?:if|when)\b|\bas needed\b|\bif it improves\b|\bfitting canonical\b|\bshort safety pointer\b", re.IGNORECASE)
          assert all(not known_vague_assertion.search(assertion) for case in cases for assertion in case["assertions"]), "known vague eval assertion returned; static lint does not replace semantic review"
          assert len(cases) >= 3, "at least three behavior evals are required"
          cases_by_id = {case["id"]: case for case in cases}
          fixed_behavior_smoke = {
              1: {"initialize"},
              29: {"audit", "read-only"},
              31: {"delete", "route"},
              33: {"refresh"},
          }
          assert all(required <= set(cases_by_id.get(case_id, {}).get("covers", [])) for case_id, required in fixed_behavior_smoke.items()), "fixed behavior smoke coverage drifted"
          assert all({"route", "safety"} <= set(cases_by_id[case_id]["covers"]) for case_id in (20, 34)), "routing safety regression case lost its critical tags"
          critical_case_tags = {
              3: "delete", 25: "mutating-command", 26: "mutating-command",
              27: "delete", 28: "mutating-command", 33: "mutating-command",
          }
          assert all(tag in cases_by_id[case_id]["covers"] for case_id, tag in critical_case_tags.items()), "critical behavior case lost its repeat-routing tag"
          read_only_audit_cases = {2, 3, 9, 11, 24, 27}
          assert all("The audit changes no repository files." in cases_by_id[case_id]["assertions"] for case_id in read_only_audit_cases), "audit case lost its all-files read-only assertion"
          assert "No command is selected or proposed while" in cases_by_id[2]["assertions"][1], "conflicting-command case permits an unsupported choice"
          assert any("old-handoff.md file remains present" in assertion for assertion in cases_by_id[4]["assertions"]), "unapproved cleanup case permits deletion"
          assert any("remains present and empty" in assertion and "neither deleted nor filled" in assertion for assertion in cases_by_id[28]["assertions"]), "empty-scaffold case permits the opposite outcome"
          assert "before they can reasonably discover" in cases_by_id[20]["prompt"], "root safety pointer case lacks early-discovery evidence"
          assert "No AGENTS.md is created." in cases_by_id[35]["assertions"], "existing-index case permits invented agent guidance"
          assert any("architecture.md and deployment.md files remain unchanged" in assertion for assertion in cases_by_id[35]["assertions"]), "existing-index case permits canonical-doc rewrites"
          assert any("adds one Deployment link" in assertion and "adds no unrelated content" in assertion for assertion in cases_by_id[35]["assertions"]), "existing-index case permits unrelated index rewrites"
          nonblocking_gap_cases = {1, 8, 17, 18, 20, 21, 31, 32, 34}
          assert all("nonblocking" in (cases_by_id[case_id]["expected_output"] + " " + " ".join(cases_by_id[case_id]["assertions"])).lower() for case_id in nonblocking_gap_cases), "nonblocking gap regression case lost its classification"
          assert all(any("Nonblocking safety gap" in assertion and "without inventing" in assertion and "requesting Needs Input" in assertion for assertion in cases_by_id[case_id]["assertions"]) for case_id in (31, 32, 34)), "preserved safety case permits a missing-alternative report omission"
          blocking_needs_input_cases = {2, 15, 28, 30}
          assert all("Needs Input" in cases_by_id[case_id]["expected_output"] for case_id in blocking_needs_input_cases), "blocking case lost its Needs Input classification"
          assert cases_by_id[34].get("files"), "post-edit fallback case requires a reproducible fixture"
          stateful_tags = {"refresh", "clean", "delete", "route", "conflict", "generated", "safety"}
          assert all(case.get("files") or ("no-op" in case["covers"] and not (stateful_tags & set(case["covers"]))) for case in cases), "stateful behavior case lacks a reproducible fixture"
          neutral_path = Path("evals/files/neutral/README.md")
          assert neutral_path.is_file(), "neutral evaluation fixture missing"
          neutral_lower = neutral_path.read_text(encoding="utf-8").lower()
          assert all(term not in neutral_lower for term in ("evaluation", "benchmark", "onboardkit", "agent skill", "expected output")), "neutral fixture leaks evaluation context"
          assert all(term in maintainer_contract for term in ("project-trust state", "effective project configuration", "explicitly trust fixture repositories", "fresh target", "grade only each query's declared `should_trigger` label", "grade their declared assertions")), "reproducible cross-track evaluation contract drifted"
          assert all(term in maintainer_contract for term in ("explicitly authorizes deletion", "literal path", "file-matching glob")), "maintainer deletion authority drifted"

          required_coverage = {
              "initialize", "refresh", "audit", "clean", "route", "scope",
              "authority", "conflict", "read-only", "delete", "trigger-boundary",
              "provenance", "no-op", "generated", "mutating-command", "projection", "safety",
          }
          assert all(
              isinstance(case["covers"], list)
              and case["covers"]
              and len(case["covers"]) == len(set(case["covers"]))
              and all(cover in required_coverage for cover in case["covers"])
              for case in cases
          ), "invalid eval coverage"
          actual_coverage = {cover for case in cases for cover in case["covers"]}
          assert actual_coverage == required_coverage, "behavior eval coverage drifted"

          fixture_refs = []
          for case in cases:
              files = case.get("files", [])
              assert isinstance(files, list), "eval files must be a list"
              assert all(isinstance(filename, str) and filename for filename in files), "invalid eval file"
              assert len(files) == len(set(files)), "duplicate eval file"
              for filename in files:
                  path = Path(filename)
                  assert not path.is_absolute() and ".." not in path.parts, "unsafe eval file path"
                  assert path.parts[:2] == ("evals", "files") and path.is_file(), "missing eval file"
                  fixture_refs.append(filename)

          queries = json.loads(Path("evals/eval_queries.json").read_text(encoding="utf-8"))
          assert len({item["query"] for item in queries}) == len(queries), "trigger queries must be unique"
          assert all(set(item) == {"query", "should_trigger", "set"} for item in queries), "unexpected trigger fields"
          assert all(isinstance(item["query"], str) and item["query"] and type(item["should_trigger"]) is bool for item in queries), "invalid trigger case"
          assert all(item["set"] in {"train", "validation"} for item in queries), "invalid trigger split"
          assert len(queries) >= 20, "trigger suite needs at least 20 realistic queries"
          for split in ("train", "validation"):
              split_items = [item for item in queries if item["set"] == split]
              positives = sum(item["should_trigger"] for item in split_items)
              assert positives and positives == len(split_items) - positives, f"{split} trigger split must be balanced"
          fixed_trigger_smoke = {
              1: ("train", True, "Set up a lightweight AGENTS.md and sensible docs structure for this repository."),
              7: ("validation", True, "Audit our active AGENTS.override.md and fallback instructions without flattening their scopes."),
              13: ("train", False, "Review the AGENTS.md changes in this pull request for correctness and missing tests, but do not rewrite or reorganize repository guidance."),
              18: ("train", False, "Run the built-in Codex /init command in this repository."),
          }
          assert all((queries[index - 1]["set"], queries[index - 1]["should_trigger"], queries[index - 1]["query"]) == expected for index, expected in fixed_trigger_smoke.items()), "fixed trigger smoke identity drifted"
          assert queries[3]["should_trigger"] and "agent-facing repository guidance" in queries[3]["query"].lower(), "docs-cleanup trigger boundary widened beyond agent guidance"

          print(f"Validated {len(cases)} evals, {len(queries)} trigger queries, {len(fixture_refs)} fixture references, a neutral fixture, and {len(runtime_files)} runtime files.")
          PY
