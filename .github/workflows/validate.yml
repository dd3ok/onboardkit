name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Validate skill contract
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          def parse_skill(path):
              text = path.read_text(encoding="utf-8")
              parts = text.split("---", 2)
              assert len(parts) == 3 and not parts[0].strip(), f"invalid frontmatter delimiters: {path}"
              metadata = {}
              for line in parts[1].splitlines():
                  if line.strip():
                      key, value = line.split(":", 1)
                      metadata[key.strip()] = value.strip().strip('"')
              return text, metadata, parts[2].strip()

          runtime = Path("skills/onboardkit")
          skill_text, metadata, _ = parse_skill(runtime / "SKILL.md")
          legacy_text, legacy_metadata, legacy_body = parse_skill(Path("SKILL.md"))

          assert set(metadata) == {"name", "description"}, "unexpected frontmatter fields"
          assert re.fullmatch(r"[a-z0-9]+(?:-[a-z0-9]+)*", metadata["name"]), "invalid skill name"
          assert metadata["name"] == "onboardkit", "skill name mismatch"
          assert runtime.name == metadata["name"], "skill directory/name mismatch"
          assert 1 <= len(metadata["description"]) <= 1024, "invalid description"
          description_lead = metadata["description"][:120].lower()
          assert any(term in description_lead for term in ("initializ", "refresh", "audit", "clean", "rout")), "description must front-load its use cases"
          description_lower = metadata["description"].lower()
          assert any(scope in description_lower for scope in ("agents.md", "agent instruction", "coding agent")), "description scope missing"
          assert any(boundary in description_lower for boundary in ("not for ", "do not use for ", "do not use to ", "use only when ", "use only for ", "use when the user explicitly ")), "description boundary missing"
          assert len(re.findall(r"\S+", skill_text)) <= 500, "SKILL.md exceeds 500 words"
          assert legacy_metadata == metadata, "legacy and canonical frontmatter differ"
          assert len(re.findall(r"\S+", legacy_text)) <= 100, "legacy entrypoint is not minimal"

          expected_legacy_body = (
              "# onboardkit compatibility entrypoint\n\n"
              "Read and follow [the canonical onboardkit skill](skills/onboardkit/SKILL.md).\n\n"
              "This file only preserves existing full-repository installations. "
              "New installations must install `skills/onboardkit/` directly."
          )
          assert legacy_body == expected_legacy_body, "legacy entrypoint drifted"

          required_runtime_files = {"SKILL.md", "LICENSE", "agents/openai.yaml"}
          runtime_files = {
              path.relative_to(runtime).as_posix()
              for path in runtime.rglob("*")
              if path.is_file()
          }
          assert required_runtime_files <= runtime_files, "missing canonical runtime file"
          for filename in runtime_files:
              parts = Path(filename).parts
              allowed_reference = len(parts) == 2 and parts[0] == "references" and Path(filename).suffix == ".md"
              assert filename in required_runtime_files or allowed_reference, f"unexpected runtime file: {filename}"

          assert Path("agents/openai.yaml").read_bytes() == (runtime / "agents/openai.yaml").read_bytes(), "legacy UI metadata drifted"
          assert Path("LICENSE").read_bytes() == (runtime / "LICENSE").read_bytes(), "runtime license drifted"

          readme = Path("README.md").read_text(encoding="utf-8")
          assert "$skill-installer" in readme and "tree/main/skills/onboardkit" in readme, "canonical installer path missing"
          assert "--no-cone" not in readme, "deprecated non-cone install guidance returned"
          assert not re.search(r"git(?:\s+-C\s+\S+)?\s+sparse-checkout", readme), "direct git sparse-checkout guidance returned"
          assert not re.search(r"git clone[^\n]*(?:\.agents|\.codex)/skills", readme), "full repository skill install returned"
          assert "Compared with Codex `/init`" in readme, "Codex init comparison missing"
          assert "or no file" in readme, "actionable no-op behavior missing from README"
          assert "it does not execute a model" in readme, "declarative-CI boundary missing from README"

          required_sections = [
              "## Decision Model",
              "## Workflow",
              "## Verification",
              "## Report",
              "## Maintenance",
          ]
          positions = [skill_text.find(section) for section in required_sections]
          assert all(position >= 0 for position in positions), "required skill section missing"
          assert positions == sorted(positions), "skill sections are out of order"

          forbidden_runtime_patterns = {
              "fixed AGENTS size": r"200-400",
              "ambiguous deletion preservation": r"Preserve deletions",
              "broad skill exclusion": r"ignored/external skill copies",
          }
          for label, pattern in forbidden_runtime_patterns.items():
              assert not re.search(pattern, skill_text, re.IGNORECASE), f"stale runtime pattern returned: {label}"

          checked_text = skill_text + legacy_text + readme + Path("agents/openai.yaml").read_text(encoding="utf-8")
          assert "\ufffd" not in checked_text, "replacement character found in maintained text"

          eval_doc = json.loads(Path("evals/evals.json").read_text(encoding="utf-8"))
          cases = eval_doc["evals"]
          case_ids = [case["id"] for case in cases]
          allowed_eval_fields = {"id", "covers", "prompt", "expected_output", "assertions", "files"}
          required_eval_fields = {"id", "covers", "prompt", "expected_output", "assertions"}
          assert all(required_eval_fields <= set(case) <= allowed_eval_fields for case in cases), "unexpected eval fields"
          assert eval_doc["skill_name"] == metadata["name"], "eval skill name mismatch"
          assert all(type(case_id) is int and case_id > 0 for case_id in case_ids), "invalid eval ID"
          assert len(case_ids) == len(set(case_ids)), "eval IDs must be unique"
          assert len({case["prompt"] for case in cases}) == len(cases), "eval prompts must be unique"
          assert all(
              isinstance(case["prompt"], str)
              and case["prompt"]
              and isinstance(case["expected_output"], str)
              and case["expected_output"]
              and isinstance(case["assertions"], list)
              and case["assertions"]
              and all(isinstance(assertion, str) and assertion for assertion in case["assertions"])
              for case in cases
          ), "incomplete eval case"
          assert all(len(case["assertions"]) == len(set(case["assertions"])) for case in cases), "duplicate assertion within eval"
          assert len(cases) >= 3, "at least three behavior evals are required"

          required_coverage = {
              "initialize", "refresh", "audit", "clean", "route", "scope",
              "authority", "conflict", "read-only", "delete", "trigger-boundary",
              "provenance", "no-op", "generated", "mutating-command", "projection", "safety",
          }
          assert all(
              isinstance(case["covers"], list)
              and case["covers"]
              and len(case["covers"]) == len(set(case["covers"]))
              and all(cover in required_coverage for cover in case["covers"])
              for case in cases
          ), "invalid eval coverage"
          actual_coverage = {cover for case in cases for cover in case["covers"]}
          assert actual_coverage == required_coverage, "behavior eval coverage drifted"

          fixture_refs = []
          for case in cases:
              files = case.get("files", [])
              assert isinstance(files, list), "eval files must be a list"
              assert all(isinstance(filename, str) and filename for filename in files), "invalid eval file"
              assert len(files) == len(set(files)), "duplicate eval file"
              for filename in files:
                  path = Path(filename)
                  assert not path.is_absolute() and ".." not in path.parts, "unsafe eval file path"
                  assert path.parts[:2] == ("evals", "files") and path.is_file(), "missing eval file"
                  fixture_refs.append(filename)

          queries = json.loads(Path("evals/eval_queries.json").read_text(encoding="utf-8"))
          assert len({item["query"] for item in queries}) == len(queries), "trigger queries must be unique"
          assert all(set(item) == {"query", "should_trigger", "set"} for item in queries), "unexpected trigger fields"
          assert all(isinstance(item["query"], str) and item["query"] and type(item["should_trigger"]) is bool for item in queries), "invalid trigger case"
          assert all(item["set"] in {"train", "validation"} for item in queries), "invalid trigger split"
          assert len(queries) >= 20, "trigger suite needs at least 20 realistic queries"
          for split in ("train", "validation"):
              split_items = [item for item in queries if item["set"] == split]
              positives = sum(item["should_trigger"] for item in split_items)
              assert positives and positives == len(split_items) - positives, f"{split} trigger split must be balanced"

          print(f"Validated {len(cases)} evals, {len(queries)} trigger queries, {len(fixture_refs)} fixture references, and {len(runtime_files)} runtime files.")
          PY
